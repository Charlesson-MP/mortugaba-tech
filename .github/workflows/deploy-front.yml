name: Deploy Front (main)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        shell: bash
        run: |
          docker build -t community-front:main .

      - name: Deploy
        shell: bash
        run: |
          cd /opt/stacks/community/front-main
          docker compose up -d
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
